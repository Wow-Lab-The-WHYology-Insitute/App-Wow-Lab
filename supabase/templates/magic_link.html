<!-- supabase/templates/magic_link.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#F6F2F4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F6F2F4;padding:32px 16px;">
<tr><td align="center">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:16px;overflow:hidden;">

<!-- Header band -->
<tr>
<td align="center" style="background-color:#EC008C;background-image:linear-gradient(135deg,#EC008C 0%,#FAA21B 100%);padding:36px 24px;">
<span style="font-size:26px;font-weight:700;color:#ffffff;letter-spacing:1px;">WOW LAB</span>
</td>
</tr>

<!-- Body -->
<tr>
<td style="padding:40px 36px;">
<h1 style="margin:0 0 16px;font-size:22px;font-weight:700;color:#241A22;">Your sign-in link</h1>
<p style="margin:0 0 28px;font-size:15px;line-height:1.6;color:#4A4048;">
Click the button below to sign in to WOW LAB OS. This link can only be used once and expires shortly.
</p>

<!-- Bulletproof button -->
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
<tr>
<td align="center" bgcolor="#EC008C" style="border-radius:999px;background-color:#EC008C;background-image:linear-gradient(135deg,#EC008C 0%,#FAA21B 100%);">
<a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=magiclink" target="_blank"
style="display:inline-block;padding:15px 40px;font-size:15px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#ffffff;text-decoration:none;border-radius:999px;">
Sign in
</a>
</td>
</tr>
</table>

<p style="margin:0;font-size:13px;line-height:1.5;color:#8B8088;">
This link can only be used once and will expire shortly. If you didn't request this email, you can safely ignore it.
</p>
</td>
</tr>

<!-- Footer -->
<tr>
<td style="padding:20px 36px;background-color:#F6F2F4;">
<p style="margin:0;font-size:12px;color:#8B8088;text-align:center;">
WOW LAB · The WHY-ology Institute
</p>
</td>
</tr>

</table>
</td></tr>
</table>
</body>
</html>
